<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DataScript AI - API Documentation</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Swagger UI CSS from CDN -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estilos base Premium con tema oscuro de alta legibilidad */
        :root {
            --bg-main: #0c0e17;
            --bg-card: rgba(20, 24, 46, 0.95);
            --border-glow: rgba(99, 102, 241, 0.3);
            --primary: #6366f1;
            --secondary: #a855f7;
            --text-main: #f8fafc;        /* Texto principal más brillante (blanco/gris claro) */
            --text-muted: #cbd5e1;       /* Texto secundario de alta visibilidad (anteriormente plomo oscuro) */
            --text-param: #94a3b8;       /* Gris claro para parámetros */
            --response-border: #10b981;  /* Verde esmeralda para destacar las respuestas */
        }

        html, body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 45%);
            background-attachment: fixed;
        }

        /* Contenedor del encabezado */
        .api-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 20px 20px;
            text-align: center;
        }

        .api-title {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
            letter-spacing: -0.02em;
        }

        .api-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 400;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Sobreescribir estilos de Swagger UI para acoplarlo al Dark Mode */
        .swagger-ui {
            background-color: transparent !important;
            font-family: 'Outfit', sans-serif !important;
        }

        .swagger-ui .info, .swagger-ui .scheme-container {
            display: none !important; 
        }

        /* Tarjetas de endpoints */
        .swagger-ui .opblock {
            background: var(--bg-card) !important;
            border: 1px solid var(--border-glow) !important;
            border-radius: 16px !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3) !important;
            margin: 0 0 24px 0 !important;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        .swagger-ui .opblock:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(99, 102, 241, 0.25) !important;
            border-color: rgba(99, 102, 241, 0.5) !important;
        }

        /* Títulos de sección y métodos */
        .swagger-ui .opblock-tag {
            color: #ffffff !important;
            font-size: 1.5rem !important;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1) !important;
            padding: 12px 0 !important;
            font-weight: 700 !important;
            font-family: 'Outfit', sans-serif !important;
        }

        /* Ruta y texto de cada endpoint en la barra de resumen */
        .swagger-ui .opblock .opblock-summary-operation-id,
        .swagger-ui .opblock .opblock-summary-path,
        .swagger-ui .opblock .opblock-summary-path a,
        .swagger-ui .opblock .opblock-summary-description {
            color: #ffffff !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        .swagger-ui .opblock .opblock-summary-description {
            color: var(--text-muted) !important;
            font-weight: 400 !important;
        }

        /* Descripciones del Endpoint */
        .swagger-ui .opblock-description-wrapper p, 
        .swagger-ui .opblock-external-docs-wrapper p, 
        .swagger-ui .opblock-title_normal p,
        .swagger-ui .opblock-title_normal {
            color: var(--text-muted) !important;
            font-size: 14px !important;
            line-height: 1.6;
        }

        /* Tablas y Parámetros */
        .swagger-ui table thead tr td, .swagger-ui table thead tr th {
            color: #ffffff !important;
            font-weight: 600 !important;
            border-bottom: 2px solid rgba(255, 255, 255, 0.15) !important;
        }

        .swagger-ui .parameter__name {
            color: #ffffff !important;
            font-weight: 600 !important;
        }

        .swagger-ui .parameter__type,
        .swagger-ui .parameter__in {
            color: var(--text-param) !important;
            font-family: monospace;
        }

        .swagger-ui .parameter__name.required::after {
            color: #f87171 !important;
            font-weight: 800;
        }

        .swagger-ui .opblock-section-header {
            background: rgba(255, 255, 255, 0.04) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .swagger-ui .opblock-section-header h4 {
            color: #ffffff !important;
            font-weight: 700 !important;
        }

        /* Inputs y Campos de Formulario */
        .swagger-ui input[type=text], 
        .swagger-ui select, 
        .swagger-ui textarea {
            background: #111322 !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #ffffff !important;
            border-radius: 8px !important;
            padding: 10px 14px !important;
            font-size: 14px !important;
        }

        .swagger-ui input[type=text]:focus, 
        .swagger-ui select:focus, 
        .swagger-ui textarea:focus {
            border-color: var(--primary) !important;
            outline: none;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }

        /* ========================================================== */
        /* DIFERENCIACIÓN CLARA DE RESPUESTAS (RESPONSES) */
        /* ========================================================== */
        
        /* Contenedor completo de las respuestas */
        .swagger-ui .responses-wrapper {
            margin-top: 30px !important;
            padding: 20px !important;
            background: rgba(16, 185, 129, 0.03) !important; /* Fondo sutil esmeralda */
            border: 2px dashed rgba(16, 185, 129, 0.3) !important; /* Borde segmentado */
            border-radius: 12px !important;
            position: relative;
        }

        /* Añadir un banner "RESPONSES / RESPUESTAS" dinámicamente arriba del contenedor */
        .swagger-ui .responses-wrapper::before {
            content: "SALIDA / RESPUESTA DE LA PRUEBA (RESPONSE)";
            display: inline-block;
            background: var(--response-border);
            color: #0b0d19;
            font-weight: 800;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            letter-spacing: 0.05em;
        }

        /* Borde e indicador del bloque del código de respuesta al ejecutar */
        .swagger-ui .live-responses-table {
            border-left: 4px solid var(--response-border) !important;
            background: rgba(16, 185, 129, 0.02) !important;
            padding-left: 10px;
        }

        .swagger-ui .response-col_status {
            color: #10b981 !important;
            font-weight: bold !important;
            font-size: 16px !important;
        }

        /* Bloques de código de respuestas */
        .swagger-ui .model-box, 
        .swagger-ui pre,
        .swagger-ui .highlight-code pre {
            background: #080a14 !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            color: #34d399 !important; /* Verde brillante de alta legibilidad para el JSON de respuesta */
            font-family: 'Consolas', 'Courier New', monospace !important;
            font-size: 13px !important;
            padding: 15px !important;
        }

        /* Botones generales */
        .swagger-ui .btn {
            border-radius: 8px !important;
            font-family: 'Outfit', sans-serif !important;
            font-weight: 600 !important;
            transition: all 0.2s ease !important;
            letter-spacing: 0.02em;
        }

        /* Botón de Ejecutar Pruebas (Execute) */
        .swagger-ui .btn.execute {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
            border: none !important;
            color: #ffffff !important;
            padding: 8px 24px !important;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3) !important;
        }

        .swagger-ui .btn.execute:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.5) !important;
        }

        /* Botón Probar (Try it Out) */
        .swagger-ui .try-out__btn {
            background: rgba(255, 255, 255, 0.08) !important;
            color: #ffffff !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 8px !important;
            padding: 8px 16px !important;
            font-weight: 600 !important;
        }

        .swagger-ui .try-out__btn.cancel {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: #f87171 !important;
            color: #f87171 !important;
        }

        /* Contenedor principal de Swagger */
        #swagger-ui {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 80px 20px;
        }

        /* Barra de navegación superior */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            font-size: 0.95rem;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">
            <i class="fa-solid fa-brain-circuit"></i> DataScript AI
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link">Analizador</a>
            <a href="/api-docs" class="nav-link active">API Docs</a>
            <a href="/html/usu_skills.html" class="nav-link">AI Skills</a>
        </div>
    </nav>

    <div class="api-header">
        <h1 class="api-title">Centro para desarrolladores y referencia de API</h1>
        <p class="api-subtitle">Prueba e integra de forma interactiva la potencia de nuestro motor de documentación, auditoría de base de datos con Python y generación de IA en tus propios servicios.</p>
    </div>

    <div id="swagger-ui"></div>

    <!-- Swagger UI JS Bundle from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.11.0/swagger-ui-standalone-preset.js"></script>
    
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                url: "/openapi.json",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout"
            });
            window.ui = ui;
        };
    </script>
</body>
</html>
